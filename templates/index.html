<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SpecFreak // ELITE COMMAND CENTER</title>
    <!-- Use Google Fonts for dynamic modern typography -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" type="image/png" href="https://img.icons8.com/isometric/50/controller.png">
</head>
<body>
    <!-- Immersive Layers -->
    <div id="cursor-halo"></div>
    <div id="cursor-dot"></div>
    
    <div class="app-background">
        <div class="neon-grid"></div>
        <canvas id="ambient-canvas"></canvas>
    </div>

    <!-- --- ELITE SIDEBAR --- -->
    <aside class="sidebar">
        <div class="sidebar-logo">SPEC<span>FREAK</span></div>
        
        <nav class="sidebar-nav">
            <div class="nav-item active" onclick="switchTab('discovery')">
                <i>🔍</i>
                <span>Discovery</span>
            </div>
            <div class="nav-item" onclick="switchTab('stats')">
                <i>📊</i>
                <span>Telemetry</span>
            </div>
            <div class="nav-item" onclick="switchTab('archive')">
                <i>🕹️</i>
                <span>Archive</span>
            </div>
            <div class="nav-item" onclick="switchTab('neural')">
                <i>⚙️</i>
                <span>Neural-Config</span>
            </div>
        </nav>

        <div class="sidebar-stats">
            <header style="margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem;">
                <span style="font-family: 'Orbitron'; font-size: 0.7rem; letter-spacing: 0.1em; color: var(--text-secondary);">SYSTEM STATUS</span>
            </header>
            <div class="stat-row">
                <span class="stat-label">Games Analyzed</span>
                <span class="stat-value" id="stat-total">15,063</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Neural Latency</span>
                <span class="stat-value" id="stat-latency">120ms</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Scanner ID</span>
                <span class="stat-value">2026.4.ELITE</span>
            </div>
        </div>
    </aside>

    <!-- --- MAIN DASHBOARD --- -->
    <main class="main-dashboard" id="main-panel">
        <header class="dashboard-header">
            <p style="text-transform: uppercase; letter-spacing: 0.3em; font-size: 0.75rem; color: var(--secondary-neon); margin-bottom: 0.5rem;">Discovery Phase: Initialized</p>
            <h1>Atmospheric Recommendation HUB</h1>
        </header>

        <section class="command-hub">
            <div class="hud-panel">
                <p style="font-family: 'Orbitron'; font-size: 0.7rem; color: var(--text-secondary); margin-bottom: 1.5rem; letter-spacing: 0.15em;">// ENTER SEMANTIC ATMOSPHERE QUERY</p>
                
                <textarea id="query" rows="4" placeholder="REQUESTING INPUT: e.g. An atmospheric post-apocalyptic story with neon noir vibes and immersive scoring..."></textarea>
                
                <!-- Quick-Select Pills -->
                <div style="display: flex; flex-wrap: wrap; gap: 0.75rem; justify-content: center; margin-top: 1.5rem;">
                    <span class="pill" onclick="runDemo('Dark emotional single-player story game like the witcher')">DARK STORY</span>
                    <span class="pill" onclick="runDemo('Fast paced competitive multiplayer hero shooter')">ELITE FPS</span>
                    <span class="pill" onclick="runDemo('Relaxing pixel art farming simulator cozy vibe')">COZY CORE</span>
                    <span class="pill" onclick="runDemo('Soulslike brutally difficult parrying combat')">HARDCORE</span>
                </div>

                <button class="btn-initialize" id="search-btn">
                    <span id="btn-text">INITIALIZE SYSTEM SCAN</span>
                    <div class="loader" id="btn-loader" style="display: none; margin: 0 auto;"></div>
                </button>
            </div>

            <!-- Dynamic Scan Results -->
            <div id="results-container" class="results-grid">
                <!-- AI Recommendations Injected Here -->
            </div>
        </section>
    </main>

    <!-- Core Neural Experience Script -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
